name: Terraform

on:
  pull_request:
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  plan:
    if: >-
      github.event_name == 'pull_request'
      || (github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && startsWith(github.event.comment.body, 'plan')
        && (github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'MEMBER'
          || github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR ref
        if: github.event_name == 'issue_comment'
        id: pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          ref: ${{ steps.pr.outputs.ref || '' }}
          fetch-depth: 1

      - name: Parse comment
        if: github.event_name == 'issue_comment'
        id: parse
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            const parseTargets = require('./.github/scripts/parse-targets.js');
            await parseTargets({github, context, core, heading: 'Plan'});

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=$R2_STATE_BUCKET" \
            -backend-config="endpoints={s3=\"$R2_ENDPOINT\"}"
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_STATE_BUCKET: ${{ secrets.R2_STATE_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Terraform Format Check
        id: fmt
        if: steps.init.outcome == 'success'
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        if: steps.init.outcome == 'success'
        run: terraform validate -no-color
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        if: steps.fmt.outcome == 'success' && steps.validate.outcome == 'success'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_ADMIN }}
          CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
          CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_zone_id_com: ${{ secrets.ZONE_ID_COM }}
          TF_VAR_zone_id_dev: ${{ secrets.ZONE_ID_DEV }}
          TF_VAR_zone_id_net: ${{ secrets.ZONE_ID_NET }}
          TF_VAR_access_allowed_email: ${{ secrets.ACCESS_ALLOWED_EMAIL }}
          TF_VAR_protonmail_dkim_cname_target: ${{ secrets.PROTONMAIL_DKIM_CNAME_TARGET }}
          TF_VAR_protonmail_verification_token: ${{ secrets.PROTONMAIL_VERIFICATION_TOKEN }}
          TF_VAR_google_site_verification: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          TF_VAR_github_org_verification: ${{ secrets.GITHUB_ORG_VERIFICATION }}
          TF_VAR_resend_dkim_public_key: ${{ secrets.RESEND_DKIM_PUBLIC_KEY }}
          TF_VAR_dmarc_rua_email: ${{ secrets.DMARC_RUA_EMAIL }}
          TF_VAR_checkly_alert_email: ${{ secrets.CHECKLY_ALERT_EMAIL }}
          TARGET_FLAGS: ${{ steps.parse.outputs.targets }}
        run: |
          # $TARGET_FLAGS is intentionally unquoted to allow word-splitting
          # into separate -target arguments. The value is pre-validated by
          # .github/scripts/parse-targets.js to contain only safe characters.
          # Globbing is disabled because targets may contain brackets.
          set -f
          terraform plan -no-color -out=tfplan $TARGET_FLAGS

      - name: Record plan SHA
        if: steps.plan.outcome == 'success'
        env:
          PLAN_SHA: ${{ github.event.pull_request.head.sha || steps.pr.outputs.sha }}
        run: echo "$PLAN_SHA" > plan-sha.txt

      # Always writes plan-targets.txt, even for full plans (empty file).
      # The apply workflow reads this file to decide whether to auto-merge.
      # Empty or absent = full plan (merge allowed). Non-empty = targeted (no merge).
      - name: Record plan targets
        if: steps.plan.outcome == 'success'
        env:
          TARGET_LIST: ${{ steps.parse.outputs.target_list }}
        run: printf '%s' "$TARGET_LIST" > plan-targets.txt

      - name: Post Results to PR
        if: always() && steps.parse.outcome != 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        env:
          INIT_OUTCOME: ${{ steps.init.outcome }}
          INIT_OUTPUT: ${{ steps.init.outputs.stderr }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          FMT_OUTPUT: ${{ steps.fmt.outputs.stdout }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          VALIDATE_OUTPUT: ${{ steps.validate.outputs.stderr }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
          PLAN_ERR: ${{ steps.plan.outputs.stderr }}
          IS_TARGETED: ${{ steps.parse.outputs.is_targeted }}
          TARGET_LIST: ${{ steps.parse.outputs.target_list }}
        with:
          script: |
            const initOutcome = process.env.INIT_OUTCOME;
            const fmtOutcome = process.env.FMT_OUTCOME;
            const validateOutcome = process.env.VALIDATE_OUTCOME;
            const planOutcome = process.env.PLAN_OUTCOME;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            let body = '';
            let failed = false;

            if (initOutcome === 'failure') {
              failed = true;
              body += '## Terraform Init\n\n'
                + ':x: Init failed\n\n```\n' + process.env.INIT_OUTPUT + '\n```\n\n'
                + 'Check backend configuration and credentials.\n\n';
            }

            if (fmtOutcome === 'failure') {
              failed = true;
              body += '## Terraform Format Check\n\n'
                + ':x: Format check failed\n\n```\n' + process.env.FMT_OUTPUT + '\n```\n\n'
                + 'Run `terraform fmt -recursive` locally, commit the changes, and push to re-run.\n\n';
            }

            if (validateOutcome === 'failure') {
              failed = true;
              body += '## Terraform Validate\n\n'
                + ':x: Validation failed\n\n```\n' + process.env.VALIDATE_OUTPUT + '\n```\n\n'
                + 'Fix the configuration errors above, commit the changes, and push to re-run.\n\n';
            }

            const isTargeted = process.env.IS_TARGETED === 'true';
            const targetList = process.env.TARGET_LIST || '';

            if (!failed && fmtOutcome === 'success' && validateOutcome === 'success') {
              body += '## Terraform Plan\n\n';
              if (isTargeted) {
                body += ':dart: **Targeted Plan:** ' + targetList + '\n\n';
              }
              if (planOutcome === 'failure') {
                failed = true;
                const planOut = process.env.PLAN_OUTPUT || '';
                const planErr = process.env.PLAN_ERR || '';
                const fullOutput = (planOut + '\n' + planErr).trim();
                body += ':x: Plan failed\n\n```\n' + fullOutput + '\n```\n\n'
                  + 'Fix the errors above, commit the changes, and push to re-run.\n\n';
              } else if (planOutcome === 'success') {
                body += '<details><summary>Show Plan</summary>\n\n```\n'
                  + process.env.PLAN_OUTPUT + '\n```\n</details>';
              }
            }

            if (!failed) {
              if (isTargeted) {
                body += '\n\n---\nComment `apply` to apply this targeted plan. '
                  + 'The PR will not auto-merge; run a full `plan` afterward '
                  + 'to reconcile remaining changes.';
              } else {
                body += '\n\n---\nComment `apply` to apply this plan and merge.';
              }
            }

            body += '\n\n---\n*[View workflow run](' + runUrl + ')*';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload Plan
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: tfplan-${{ github.event.pull_request.number || github.event.issue.number }}
          path: |
            tfplan
            plan-sha.txt
            plan-targets.txt
          retention-days: 5
          overwrite: true

      - name: Check Status
        if: >-
          steps.fmt.outcome == 'failure'
          || steps.validate.outcome == 'failure'
          || steps.plan.outcome == 'failure'
        run: exit 1
